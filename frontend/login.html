<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="icon" type="image/png" href="edusphere.png" sizes="16x16">
  <link rel="stylesheet" href="login.css" />  

</head>
<body>
  <div class="wrapper">
    
    <div class="left">
      <h1>EduSphere</h1>
      <p><b>"Learning is a journey where curiosity sparks growth, knowledge fuels dreams, and persistence creates success."</b></p>
    </div>

    
    <div class="right">
      <h2>Login</h2>
      <form id="loginForm">
        <input type="email" id="email" placeholder="Email" required />
        <input type="password" id="password" placeholder="Password" required />
        <button type="submit">Login</button>
      </form>
      <p>Don’t have an account? <a href="register.html">Register</a></p>
      <p id="message"></p>
    </div>
  </div>

 <script src="login.js"></script>
</body>
</html>
